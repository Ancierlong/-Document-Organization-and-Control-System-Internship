<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Editor (PDF.js Worker)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.14.305/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.14.305/pdf.worker.min.js";
    </script>
    <style>
        .canvas-container {
            position: relative;
            display: inline-block;
        }
        canvas {
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <h2>Upload and Modify PDF (PDF.js Worker)</h2>
    
    <input type="file" id="pdfUpload" accept="application/pdf">
    <button onclick="loadPDF()">Load PDF</button>
    <br><br>
    
    <label>Page:</label>
    <select id="pageSelect" onchange="renderPDFPage()"></select>
    <br><br>
    
    <label>Attach an Image:</label>
    <input type="file" id="imageInput" accept="image/*">
    <br><br>
    
    <label>X Position:</label>
    <input type="number" id="xPos" value="50">
    <label>Y Position:</label>
    <input type="number" id="yPos" value="300">
    <br><br>
    
    <div class="canvas-container">
        <canvas id="pdfCanvas"></canvas>
    </div>
    <br>
    <button onclick="processPDF()">Save PDF</button>
    
    <script>
        let pdfDoc;
        let pdfArrayBuffer;
        async function loadPDF() {
            const fileInput = document.getElementById('pdfUpload').files[0];
            if (!fileInput) {
                alert("Please upload a PDF file.");
                return;
            }
            
            const reader = new FileReader();
            reader.readAsArrayBuffer(fileInput);
            reader.onload = async function () {
                pdfArrayBuffer = reader.result;
                const pdf = await pdfjsLib.getDocument({ data: pdfArrayBuffer }).promise;
                pdfDoc = pdf;
                
                const numPages = pdf.numPages;
                const pageSelect = document.getElementById('pageSelect');
                pageSelect.innerHTML = '';
                for (let i = 1; i <= numPages; i++) {
                    const option = document.createElement('option');
                    option.value = i;
                    option.textContent = `Page ${i}`;
                    pageSelect.appendChild(option);
                }
                renderPDFPage();
            };
        }

        async function renderPDFPage() {
            const pageNumber = parseInt(document.getElementById('pageSelect').value);
            const canvas = document.getElementById('pdfCanvas');
            const ctx = canvas.getContext('2d');
            
            const page = await pdfDoc.getPage(pageNumber);
            const viewport = page.getViewport({ scale: 1.5 });
            canvas.width = viewport.width;
            canvas.height = viewport.height;
            
            const renderContext = {
                canvasContext: ctx,
                viewport: viewport
            };
            await page.render(renderContext);
        }
    </script>
</body>
</html>
